- pipeline: modete
  name: Modete
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  arch: ARM64
  actions:
  - action: npm test
    type: BUILD
    execute_commands:
    - "# yarn install"
    - npm install
    - npm test
    shell: BASH
    docker_image_name: library/node
    docker_image_tag: 22
